<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Intelligence v3.1</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0e17;--bg2:#111827;--card:#151d2e;--card-h:#1a2540;--bdr:#1e2a42;--bdr-g:#2563eb44;--t1:#e8edf5;--t2:#8896b0;--t3:#4a5875;--acc:#3b82f6;--acc-g:#3b82f640;--grn:#22c55e;--grn-b:#22c55e15;--red:#ef4444;--red-b:#ef444415;--org:#f59e0b;--org-b:#f59e0b15;--yel:#eab308;--yel-b:#eab30815;--pur:#a855f7;--pur-b:#a855f715;--cyn:#06b6d4;--cyn-b:#06b6d415;--blu:#3b82f6;--blu-b:#3b82f615}
html{scroll-behavior:smooth}body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;line-height:1.6}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.04) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0;animation:gridShift 30s linear infinite}
@keyframes gridShift{0%{background-position:0 0}100%{background-position:60px 60px}}
.bg-glow{position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:900px;height:700px;background:radial-gradient(ellipse,rgba(59,130,246,.1),transparent 70%);pointer-events:none;z-index:0;animation:glowPulse 6s ease-in-out infinite}
@keyframes glowPulse{0%,100%{opacity:.7;transform:translateX(-50%) scale(1)}50%{opacity:1;transform:translateX(-50%) scale(1.05)}}
.container{position:relative;z-index:1;max-width:1440px;margin:0 auto;padding:2rem 2rem 5rem}
.header{text-align:center;padding:2.5rem 0 2rem;animation:fadeInDown .6s ease both}
@keyframes fadeInDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
.header-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:var(--card);border:1px solid var(--bdr);border-radius:100px;font-size:.75rem;font-weight:600;color:var(--acc);letter-spacing:.08em;text-transform:uppercase;margin-bottom:1rem;animation:badgePop .5s ease .2s both}
@keyframes badgePop{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.header-badge .dot{width:6px;height:6px;border-radius:50%;background:var(--grn);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(34,197,94,.5)}50%{opacity:.6;box-shadow:0 0 0 6px rgba(34,197,94,0)}}
.header h1{font-family:'JetBrains Mono',monospace;font-size:2.4rem;font-weight:700;letter-spacing:-.03em;margin-bottom:.4rem;background:linear-gradient(135deg,#e8edf5 30%,#3b82f6 70%,#8896b0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-size:200% auto;animation:shimmerText 4s linear infinite}
@keyframes shimmerText{0%{background-position:0% center}100%{background-position:200% center}}
.header p{color:var(--t2);font-size:.95rem;max-width:600px;margin:0 auto}
.tabs{display:flex;gap:4px;margin-bottom:2rem;max-width:860px;margin-left:auto;margin-right:auto;background:var(--bg2);border-radius:10px;padding:4px;animation:fadeInUp .5s ease .3s both}
@keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.tab{flex:1;padding:10px;background:none;border:none;border-radius:8px;color:var(--t2);font-size:.84rem;font-weight:600;cursor:pointer;transition:all .25s;font-family:'DM Sans',sans-serif}
.tab:hover{color:var(--t1);background:rgba(255,255,255,.04)}.tab.active{background:var(--card);color:var(--t1);box-shadow:0 1px 8px rgba(0,0,0,.3)}
input,textarea{font-family:'JetBrains Mono',monospace}
.search-section{display:none;gap:10px;margin-bottom:2rem;max-width:800px;margin-left:auto;margin-right:auto}
.search-input-wrap{flex:1;position:relative}
.search-input-wrap .icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none}
.sinput{width:100%;padding:14px 16px 14px 46px;background:var(--card);border:1px solid var(--bdr);border-radius:12px;color:var(--t1);font-size:1rem;outline:none;transition:border-color .2s,box-shadow .2s}
.sinput::placeholder{color:var(--t3)}.sinput:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-g)}
.sinput.invalid{border-color:var(--red);box-shadow:0 0 0 3px rgba(239,68,68,.2)}
.val-msg{font-size:.75rem;color:var(--red);margin-top:4px;display:none}
.btn{padding:14px 28px;background:var(--acc);border:none;border-radius:12px;color:#fff;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;font-family:'DM Sans',sans-serif;position:relative;overflow:hidden}
.btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.1),transparent);opacity:0;transition:opacity .2s}
.btn:hover::after{opacity:1}.btn:hover{background:#2563eb;transform:translateY(-2px);box-shadow:0 6px 24px var(--acc-g)}.btn:active{transform:translateY(0)}.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-sm{padding:9px 18px;font-size:.82rem;border-radius:10px}
.btn-csv{background:var(--grn)}.btn-csv:hover{background:#16a34a;box-shadow:0 6px 20px rgba(34,197,94,.3)}
.btn-pur{background:var(--pur)}.btn-pur:hover{background:#9333ea;box-shadow:0 6px 20px rgba(168,85,247,.3)}
.btn-red{background:var(--red)}.btn-red:hover{background:#dc2626}
.bulk-area{display:none;max-width:800px;margin:0 auto 2rem}
.ta{width:100%;height:160px;padding:14px 16px;background:var(--card);border:1px solid var(--bdr);border-radius:12px;color:var(--t1);font-size:.88rem;outline:none;resize:vertical;transition:border-color .2s,box-shadow .2s;margin-bottom:6px}
.ta::placeholder{color:var(--t3)}.ta:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-g)}
.count{font-size:.78rem;color:var(--t3);margin-bottom:10px;font-family:'JetBrains Mono',monospace}
.btn-row{display:flex;gap:8px}
.loader{display:none;text-align:center;padding:3rem}.loader.show{display:block;animation:fadeInUp .3s ease}
.spinner{width:48px;height:48px;border:3px solid var(--bdr);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 1rem;box-shadow:0 0 20px var(--acc-g)}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{color:var(--t2);font-size:.9rem}.loader-hl{font-family:'JetBrains Mono',monospace;color:var(--acc);font-weight:600}
.pbar-wrap{max-width:440px;margin:1rem auto 0;background:var(--bg2);border-radius:8px;height:6px;overflow:hidden}
.pbar{height:100%;background:linear-gradient(90deg,var(--acc),var(--grn),var(--acc));background-size:200% 100%;border-radius:8px;transition:width .4s ease;width:0%;animation:barShimmer 1.5s linear infinite}
@keyframes barShimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}
.ptext{font-size:.78rem;color:var(--t3);margin-top:6px;font-family:'JetBrains Mono',monospace}
.results-area{display:none}
.status-hero{background:var(--card);border:1px solid var(--bdr);border-radius:18px;padding:2rem 2.5rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:1.5rem;position:relative;overflow:hidden;animation:cardReveal .5s ease both;transition:border-color .3s,box-shadow .3s}
.status-hero:hover{border-color:var(--bdr-g);box-shadow:0 0 40px rgba(59,130,246,.08)}
@keyframes cardReveal{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.status-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;animation:borderGlow 3s ease-in-out infinite}
.status-hero[data-c="green"]::before{background:linear-gradient(90deg,var(--grn),#10b981,var(--grn));background-size:200% 100%;animation:borderSlide 2s linear infinite}
.status-hero[data-c="red"]::before{background:linear-gradient(90deg,var(--red),#dc2626)}
.status-hero[data-c="orange"]::before{background:linear-gradient(90deg,var(--org),#d97706)}
.status-hero[data-c="yellow"]::before{background:linear-gradient(90deg,var(--yel),#ca8a04)}
.status-hero[data-c="blue"]::before{background:linear-gradient(90deg,var(--blu),#2563eb)}
@keyframes borderSlide{0%{background-position:0% 0}100%{background-position:200% 0}}
.si{width:60px;height:60px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.7rem;flex-shrink:0;transition:transform .3s,box-shadow .3s}
.status-hero:hover .si{transform:scale(1.08)}
.si.green{background:var(--grn-b);box-shadow:0 0 20px rgba(34,197,94,.15)}.si.red{background:var(--red-b)}.si.orange{background:var(--org-b)}.si.yellow{background:var(--yel-b)}.si.blue{background:var(--blu-b)}
.sd{font-family:'JetBrains Mono',monospace;font-size:1.3rem;font-weight:700;margin-bottom:4px}
.sl{display:inline-flex;padding:4px 12px;border-radius:100px;font-size:.76rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.sl.green{background:var(--grn-b);color:var(--grn)}.sl.red{background:var(--red-b);color:var(--red)}.sl.orange{background:var(--org-b);color:var(--org)}.sl.yellow{background:var(--yel-b);color:var(--yel)}.sl.blue{background:var(--blu-b);color:var(--blu)}
.sr{color:var(--t2);font-size:.86rem;margin-top:6px}
.sm{text-align:right;flex-shrink:0}.smi{font-size:.76rem;color:var(--t3);margin-bottom:3px}.smi span{color:var(--t2);font-family:'JetBrains Mono',monospace;font-weight:500}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:1.25rem;margin-bottom:1.5rem}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:16px;padding:1.75rem;transition:border-color .25s,box-shadow .25s,transform .25s;animation:cardReveal .4s ease both}
.card:nth-child(1){animation-delay:.05s}.card:nth-child(2){animation-delay:.1s}.card:nth-child(3){animation-delay:.15s}.card:nth-child(4){animation-delay:.2s}.card:nth-child(5){animation-delay:.25s}
.card:hover{border-color:var(--bdr-g);box-shadow:0 4px 32px rgba(59,130,246,.1);transform:translateY(-2px)}
.ch{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem}
.ci{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.05rem;transition:transform .2s}
.card:hover .ci{transform:scale(1.1)}
.ci.blue{background:var(--blu-b)}.ci.green{background:var(--grn-b)}.ci.purple{background:var(--pur-b)}.ci.cyan{background:var(--cyn-b)}.ci.orange{background:var(--org-b)}
.ct{font-weight:600;font-size:.95rem}
.ir{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bdr)}.ir:last-child{border-bottom:none}
.il{font-size:.82rem;color:var(--t3);font-weight:500}
.iv{font-family:'JetBrains Mono',monospace;font-size:.85rem;font-weight:500;text-align:right;max-width:62%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.iv.green{color:var(--grn)}.iv.red{color:var(--red)}.iv.orange{color:var(--org)}
.card-full{grid-column:1/-1}
.cv{display:flex;align-items:center;gap:10px;padding:13px 18px;border-radius:12px;margin-bottom:1rem;font-weight:600;font-size:.92rem}
.cv.green{background:var(--grn-b);color:var(--grn)}.cv.red{background:var(--red-b);color:var(--red)}.cv.orange{background:var(--org-b);color:var(--org)}.cv.yellow{background:var(--yel-b);color:var(--yel)}.cv.blue{background:var(--blu-b);color:var(--blu)}
.cv-c{margin-left:auto;font-size:.78rem;opacity:.8}
.cs{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px}
.csi{background:var(--bg2);border-radius:10px;padding:11px;text-align:center;transition:background .2s}.csi:hover{background:var(--card-h)}
.csv2{font-family:'JetBrains Mono',monospace;font-size:1.05rem;font-weight:700}.csl{font-size:.68rem;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
.rb{background:var(--red-b);border:1px solid rgba(239,68,68,.2);border-radius:10px;padding:14px;margin-bottom:1rem}
.rb-t{font-size:.84rem;font-weight:700;color:var(--red);margin-bottom:8px}.rb-d{font-size:.8rem;color:var(--t2);padding:3px 0}.rb-d span{font-family:'JetBrains Mono',monospace;color:var(--t1)}
.fb{display:inline-block;padding:3px 10px;border-radius:6px;font-size:.7rem;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:.04em;margin:2px 4px 2px 0;background:var(--bg2);color:var(--t3)}.fb.warn{background:var(--red-b);color:var(--red)}.fb.info{background:var(--blu-b);color:var(--blu)}
.bsum{display:flex;gap:1rem;margin-bottom:1.25rem;flex-wrap:wrap}
.bsi{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:1rem 1.5rem;text-align:center;flex:1;min-width:110px;transition:transform .2s,border-color .2s;animation:cardReveal .4s ease both}
.bsi:hover{transform:translateY(-2px);border-color:var(--bdr-g)}
.bsv{font-family:'JetBrains Mono',monospace;font-size:1.5rem;font-weight:700}.bsl{font-size:.72rem;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-top:3px}
.bact{display:flex;justify-content:flex-end;margin-bottom:1rem;gap:8px;flex-wrap:wrap}
.btw{overflow-x:auto;border-radius:14px;border:1px solid var(--bdr);animation:cardReveal .4s ease .1s both}
.bt{width:100%;border-collapse:collapse;font-size:.84rem}
.bt thead{background:var(--bg2)}
.bt th{padding:12px 14px;text-align:left;font-size:.72rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--bdr);white-space:nowrap}
.bt td{padding:10px 14px;border-bottom:1px solid var(--bdr);vertical-align:middle}.bt tr:last-child td{border-bottom:none}
.bt tbody tr{transition:background .15s}.bt tbody tr:hover{background:var(--card-h)}
.bd{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:.8rem}
.bsb{display:inline-block;padding:3px 9px;border-radius:6px;font-size:.7rem;font-weight:700;letter-spacing:.04em;white-space:nowrap}
.bsb.ACTIVE{background:var(--grn-b);color:var(--grn)}.bsb.DEAD,.bsb.DOWN,.bsb.SUSPENDED{background:var(--red-b);color:var(--red)}.bsb.PARKED,.bsb.NO_CONTENT,.bsb.DEFAULT_PAGE,.bsb.SHELL_SITE{background:var(--org-b);color:var(--org)}.bsb.COMING_SOON,.bsb.ISSUES{background:var(--yel-b);color:var(--yel)}.bsb.CROSS_DOMAIN_REDIRECT{background:var(--red-b);color:var(--red)}.bsb.POLITICAL_CAMPAIGN{background:var(--blu-b);color:var(--blu)}.bsb.BLOCKED{background:var(--org-b);color:var(--org)}.bsb.ERROR{background:var(--red-b);color:var(--red)}.bsb.TIMEOUT{background:var(--org-b);color:var(--org)}
.bv{font-weight:700;font-size:.82rem}.bv.yes{color:var(--grn)}.bv.no{color:var(--red)}
.social-link{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;background:var(--bg2);border-radius:5px;font-size:.7rem;color:var(--acc);text-decoration:none;margin:2px;font-family:'JetBrains Mono',monospace;transition:background .2s}.social-link:hover{background:var(--card-h);color:var(--t1)}
.social-icon-btn{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:8px;background:var(--bg2);border:1px solid var(--bdr);text-decoration:none;margin:2px;transition:all .2s;flex-shrink:0}
.social-icon-btn:hover{transform:translateY(-2px);border-color:var(--bdr-g);box-shadow:0 4px 12px rgba(59,130,246,.2)}
.social-icon-btn svg{width:15px;height:15px;display:block}
.social-icon-btn.fb-ic:hover{background:#1877f215;border-color:#1877f260}
.social-icon-btn.ig-ic:hover{background:#e1306c15;border-color:#e1306c60}
.social-icon-btn.tw-ic:hover{background:#1da1f215;border-color:#1da1f260}
.social-icon-btn.li-ic:hover{background:#0a66c215;border-color:#0a66c260}
.social-icon-btn.yt-ic:hover{background:#ff000015;border-color:#ff000060}
.social-icon-btn.tt-ic:hover{background:#69c9d015;border-color:#69c9d060}
.social-icon-btn.yl-ic:hover{background:#d32323;border-color:#d3232360}
.social-icon-btn.gb-ic:hover{background:#4285f415;border-color:#4285f460}
.social-icon-btn.wa-ic:hover{background:#25d36615;border-color:#25d36660}
.social-icon-btn.pi-ic:hover{background:#e6000015;border-color:#e6000060}
.social-icon-btn.ge-ic:hover{background:#3b82f615;border-color:#3b82f660}
.error-box{display:none;background:var(--red-b);border:1px solid rgba(239,68,68,.3);border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1.5rem;color:var(--red);font-weight:500}.error-box.show{display:block;animation:fadeInUp .3s ease}
.mono{font-family:'JetBrains Mono',monospace}
.retry-note{font-size:.72rem;color:var(--org);font-style:italic;margin-top:4px}
@media(max-width:768px){.header h1{font-size:1.6rem}.search-section{flex-direction:column}.status-hero{flex-direction:column;text-align:center;padding:1.5rem}.sm{text-align:center}.cards{grid-template-columns:1fr}.cs{grid-template-columns:repeat(2,1fr)}.bt{font-size:.76rem}.bt th,.bt td{padding:8px 9px}.btn-row{flex-direction:column}.container{padding:1.5rem 1rem 3rem}}
</style>
</head>
<body>
<div class="bg-grid"></div><div class="bg-glow"></div>
<div class="container">
<header class="header">
<div class="header-badge"><span class="dot"></span> Intelligence Engine v3.1</div>
<h1>Website Intelligence</h1>
<p>Domain analysis, content detection, and strong business extraction.</p>
</header>
<div class="tabs">
<button class="tab active" data-tab="single" onclick="switchTab('single')">Single Domain</button>
<button class="tab" data-tab="bulk" onclick="switchTab('bulk')">Bulk Analysis</button>
<button class="tab" data-tab="biz" onclick="switchTab('biz')">Business Info</button>
</div>
<div class="search-section" id="sec-single">
<div class="search-input-wrap">
<svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
<input type="text" class="sinput" id="single-input" placeholder="Enter domain (e.g. example.com)" autocomplete="off" spellcheck="false">
<div class="val-msg" id="single-val">Please enter a valid domain (e.g. example.com)</div>
</div>
<button class="btn" onclick="doSingle()">Analyze</button>
</div>
<div class="bulk-area" id="sec-bulk">
<textarea class="ta" id="bulk-ta" placeholder="Enter domains, one per line (max 100):&#10;example.com&#10;google.com" oninput="updateCt('bulk-ta','bulk-ct')"></textarea>
<div class="count" id="bulk-ct">0 domains (max 100)</div>
<div class="btn-row">
<button class="btn" id="bulk-btn" onclick="doBulk()" style="flex:1">Analyze All Domains</button>
<button class="btn btn-sm btn-red" id="bulk-cancel" onclick="cancelOp('bulk')" style="display:none">⏹ Cancel</button>
</div>
</div>
<div class="bulk-area" id="sec-biz">
<textarea class="ta" id="biz-ta" placeholder="Enter domains for business extraction (max 100):&#10;bocasmilecenter.com&#10;millerandsonsplumbing.net" oninput="updateCt('biz-ta','biz-ct')"></textarea>
<div class="count" id="biz-ct">0 domains (max 100)</div>
<div class="btn-row">
<button class="btn btn-pur" id="biz-btn" onclick="doBiz()" style="flex:1">Extract Business Info</button>
<button class="btn btn-sm btn-red" id="biz-cancel" onclick="cancelOp('biz')" style="display:none">⏹ Cancel</button>
</div>
</div>
<div class="error-box" id="errbox"></div>
<div class="loader" id="loader"><div class="spinner"></div><div class="loader-text">Processing <span class="loader-hl" id="loader-hl">...</span></div><div class="loader-text" style="margin-top:4px;font-size:.78rem;color:var(--t3)" id="loader-sub"></div><div class="pbar-wrap" id="pbar-wrap" style="display:none"><div class="pbar" id="pbar"></div></div><div class="ptext" id="ptext" style="display:none"></div></div>
<div class="results-area" id="res-single"></div>
<div class="results-area" id="res-bulk"></div>
<div class="results-area" id="res-biz"></div>
</div>

<script>
const API=window.location.origin;
let bulkData=null,bizData=null;
let cancelCtrl={bulk:null,biz:null};
// ── FIX 3a: keepalive timer ref ───────────────────────────────────────────────
let _keepaliveTimer=null;

function isValidDomain(d){
d=d.trim().toLowerCase().replace(/^(https?:\/\/)/,'').replace(/\/.*$/,'').replace(/^www\./,'');
return /^[a-z0-9]([a-z0-9\-]*[a-z0-9])?(\.[a-z0-9]([a-z0-9\-]*[a-z0-9])?)*\.[a-z]{2,}$/i.test(d);
}

function validateSingle(){
const d=document.getElementById('single-input').value.trim();
const v=document.getElementById('single-val');
const inp=document.getElementById('single-input');
if(!d){v.style.display='none';inp.classList.remove('invalid');return false}
if(!isValidDomain(d)){v.style.display='block';inp.classList.add('invalid');return false}
v.style.display='none';inp.classList.remove('invalid');return true;
}

// ── FIX 3a: Background keepalive — pings /api/health every 18s to prevent ────
// Render free-tier from sleeping mid-batch. Stopped when batch completes/cancels.
function startKeepalive(){
stopKeepalive();
_keepaliveTimer=setInterval(async()=>{
try{await fetch(API+'/api/health',{signal:AbortSignal.timeout(5000)})}catch(e){}
},18000);
}
function stopKeepalive(){
if(_keepaliveTimer){clearInterval(_keepaliveTimer);_keepaliveTimer=null}
}

// Warmup: poll /api/health until the server responds with 200 OK.
// Render free tier cold-starts in 20-35s.
async function warmup(){
const MAX=45000, INTERVAL=4000;
const t0=Date.now();
while(Date.now()-t0 < MAX){
try{
const r=await fetch(API+'/api/health',{signal:AbortSignal.timeout(INTERVAL-200)});
if(r.ok){
const elapsed=((Date.now()-t0)/1000).toFixed(1);
document.getElementById('loader-sub').textContent='Server ready ('+elapsed+'s)';
return true;
}
}catch(e){}
const remaining=Math.ceil((MAX-(Date.now()-t0))/1000);
document.getElementById('loader-sub').textContent='Waking server... ('+remaining+'s remaining)';
await new Promise(r=>setTimeout(r,300));
}
document.getElementById('loader-sub').textContent='Server may be slow — proceeding...';
return false;
}

// ── FIX 3b/3c: fetchWithRetry ─────────────────────────────────────────────────
// On empty body (server mid-sleep): re-warmup immediately before retrying.
// Increased default retries to 3 for batch callers.
async function fetchWithRetry(url,body,retries=1,signal=null){
for(let i=0;i<=retries;i++){
try{
const opts={method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)};
if(signal)opts.signal=signal;
const r=await fetch(url,opts);
const text=await r.text();
if(!text||!text.trim()){
if(i<retries){
// ── FIX: re-warmup instead of blind wait ────────────────────────────────
document.getElementById('loader-sub').textContent='Re-waking server for retry '+(i+1)+'...';
await warmup();
continue;
}
throw new Error('Server cold-start timeout. Please click the button again — the server needs a moment to wake up.');
}
let data;
try{
data=JSON.parse(text);
}catch(parseErr){
if(i<retries){await wait(2000);continue}
throw new Error('Server sent an invalid response (HTTP '+r.status+'). Please try again.');
}
if(!r.ok&&r.status>=500&&i<retries){await wait(1500);continue}
return data;
}catch(e){
if(e.name==='AbortError')throw e;
if(i<retries){await wait(2000);continue}
throw e;
}
}
}

// ─── SINGLE DOMAIN ───────────────────────────────────────────────────────────
async function doSingle(){
const d=document.getElementById('single-input').value.trim();
if(!d)return;
if(!validateSingle())return;
document.getElementById('errbox').classList.remove('show');
showLoader(d,'Waking server & analyzing...');
try{
await warmup();
const data=await fetchWithRetry(API+'/api/analyze',{domain:d},2);
if(data.error&&!data.overallStatus)throw new Error(data.message||data.error);
renderSingle(data);
}catch(e){showErr('Failed: '+e.message)}finally{hideLoader()}
}

h+='<div class="cv '+vc+'"><span style="font-size:1.1rem">'+vE(ct.verdict)+'</span><span>'+fmtV(ct.verdict)+'</span><span class="cv-c">'+(ct.confidence||0)+'%</span></div>';
if(ct.reasons?.length>0)h+='<div style="color:var(--t2);font-size:.82rem;margin-bottom:1rem">'+ct.reasons.map(r=>'• '+E(r)).join('<br>')+'</div>';
if(ct.redirectInfo)h+='<div class="rb"><div class="rb-t">⚠ Cross-Domain Redirect</div><div class="rb-d">From: <span>'+E(ct.redirectInfo.source)+'</span></div><div class="rb-d">To: <span>'+E(ct.redirectInfo.target)+'</span></div><div class="rb-d">Method: <span>'+E(ct.redirectInfo.method)+'</span></div></div>';
h+='<div class="cs" style="margin-top:1rem">'+stat(ct.details?.wordCount||0,'Words')+stat(ct.details?.uniqueWordCount||0,'Unique')+stat(ct.details?.headings?.length||0,'Headings')+stat(ct.details?.images||0,'Images')+stat(ct.details?.links?.internal||0,'Int Links')+stat(ct.details?.forms||0,'Forms')+'</div>';
if(ct.details?.title)h+='<div style="margin-top:1rem;padding:9px 13px;background:var(--bg2);border-radius:8px"><span style="font-size:.7rem;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.05em">Title</span><br><span class="mono" style="font-size:.82rem">'+E(ct.details.title)+'</span></div>';
if(ct.flags?.length>0){h+='<div style="margin-top:10px">';ct.flags.forEach(f=>{const w=['CROSS_DOMAIN_REDIRECT','SUSPICIOUS_REDIRECT_TARGET','SHELL_SITE','PARKED'].includes(f);const i=['POLITICAL_CAMPAIGN','HAS_FEC_DISCLOSURE','WEB_APP_LOGIN'].includes(f);h+='<span class="fb '+(w?'warn':i?'info':'')+'">'+f.replace(/_/g,' ')+'</span>'});h+='</div>'}
h+='</div></div>';el.innerHTML=h;

// ─── BULK ANALYSIS ───────────────────────────────────────────────────────────
async function doBulk(){
const txt=document.getElementById('bulk-ta').value.trim();if(!txt)return;
let doms=txt.split('\n').map(d=>d.trim()).filter(d=>d);
const invalid=doms.filter(d=>!isValidDomain(d));
if(invalid.length>0){showErr('Invalid domains: '+invalid.slice(0,5).join(', ')+(invalid.length>5?' (+'+(invalid.length-5)+' more)':''));return}
if(!doms.length)return;if(doms.length>100){showErr('Max 100 domains');return}
document.getElementById('errbox').classList.remove('show');
const ctrl=new AbortController();cancelCtrl.bulk=ctrl;
const btn=document.getElementById('bulk-btn');btn.disabled=true;
document.getElementById('bulk-cancel').style.display='block';
showLoader('Warming up...','Contacting server...');
await warmup();
// ── FIX 3a: start keepalive to prevent server sleeping mid-batch ─────────────
startKeepalive();
showProgress(0,doms.length,'');
const results=[];let retryQueue=[];
for(let i=0;i<doms.length;i++){
if(ctrl.signal.aborted)break;
showProgress(i,doms.length,doms[i]);
try{
// ── FIX 3d: retries=3 for batch (was 2) ──────────────────────────────────
const d=await fetchWithRetry(API+'/api/analyze',{domain:doms[i]},3,ctrl.signal);
results.push({domain:d.domain||doms[i],overallStatus:d.overallStatus||'ERROR',isGenuinelyValid:d.isGenuinelyValid||false,statusCode:d.http?.statusCode,confidence:d.content?.confidence,reasons:d.content?.reasons||[],flags:d.content?.flags||[],redirectInfo:d.content?.redirectInfo,title:d.content?.details?.title,wordCount:d.content?.details?.wordCount,uniqueWordCount:d.content?.details?.uniqueWordCount});
}catch(e){
if(e.name==='AbortError')break;
results.push({domain:doms[i],overallStatus:'ERROR',isGenuinelyValid:false,error:e.message,reasons:[e.message],flags:[]});
retryQueue.push(i);
}
// ── FIX 3d: reduced inter-domain delay 600ms→400ms ───────────────────────
if(i<doms.length-1)await wait(400);
}
if(retryQueue.length>0&&!ctrl.signal.aborted){
showLoader('Retrying '+retryQueue.length+' failed...','Second pass for failed domains');
for(const idx of retryQueue){
if(ctrl.signal.aborted)break;
try{
await wait(1000);
const d=await fetchWithRetry(API+'/api/analyze',{domain:doms[idx]},2,ctrl.signal);
const ri=results.findIndex(r=>r.domain===doms[idx]&&r.overallStatus==='ERROR');
if(ri>=0)results[ri]={domain:d.domain||doms[idx],overallStatus:d.overallStatus||'ERROR',isGenuinelyValid:d.isGenuinelyValid||false,statusCode:d.http?.statusCode,confidence:d.content?.confidence,reasons:d.content?.reasons||[],flags:d.content?.flags||[],redirectInfo:d.content?.redirectInfo,title:d.content?.details?.title,wordCount:d.content?.details?.wordCount,uniqueWordCount:d.content?.details?.uniqueWordCount,retried:true};
}catch(e){if(e.name==='AbortError')break}
}
}
btn.disabled=false;document.getElementById('bulk-cancel').style.display='none';cancelCtrl.bulk=null;
stopKeepalive();
hideLoader();bulkData=results;renderBulk(results);
}

function renderBulk(res){
const el=document.getElementById('res-bulk');el.style.display='block';
const ok=res.filter(r=>r.isGenuinelyValid).length,bad=res.filter(r=>!r.isGenuinelyValid&&r.overallStatus!=='ERROR').length,err=res.filter(r=>r.overallStatus==='ERROR').length;
let h='<div class="bsum">'+sumBox(res.length,'Total','--t1')+sumBox(ok,'Valid','--grn')+sumBox(bad,'Invalid','--org')+sumBox(err,'Errors','--red')+'</div>';
h+='<div class="bact"><button class="btn btn-sm btn-csv" onclick="exportBulkCSV()">⬇ Analysis CSV</button></div>';
h+='<div class="btw"><table class="bt"><thead><tr><th>#</th><th>Domain</th><th>Status</th><th>Valid?</th><th>Title</th><th>HTTP</th><th>Words</th><th>Confidence</th><th>Redirect Target</th><th>Flags</th><th>Remarks</th></tr></thead><tbody>';
res.forEach((r,i)=>{
h+='<tr><td class="mono" style="font-size:.74rem;color:var(--t3)">'+(i+1)+'</td>';
h+='<td><span class="bd">'+E(r.domain)+'</span>'+(r.retried?'<span style="font-size:.6rem;color:var(--org);margin-left:4px">↻</span>':'')+'</td>';
h+='<td><span class="bsb '+r.overallStatus+'">'+fmtS(r.overallStatus)+'</span></td>';
h+='<td><span class="bv '+(r.isGenuinelyValid?'yes':'no')+'">'+(r.isGenuinelyValid?'✓':'✗')+'</span></td>';
h+='<td style="font-size:.76rem;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+E(r.title||'—')+'</td>';
h+='<td class="mono" style="font-size:.78rem">'+(r.statusCode||'—')+'</td>';
h+='<td class="mono" style="font-size:.78rem">'+(r.wordCount??'—')+'</td>';
h+='<td class="mono" style="font-size:.78rem">'+(r.confidence?r.confidence+'%':'—')+'</td>';
h+='<td class="mono" style="font-size:.74rem;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+E(r.redirectInfo?.target||'—')+'</td>';
h+='<td style="font-size:.74rem;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+E(r.flags?.join(', ')||'—')+'</td>';
h+='<td style="color:var(--t2);font-size:.76rem;max-width:200px">'+E((r.reasons?.[0]||r.error||'—').substring(0,100))+'</td></tr>'});
h+='</tbody></table></div>';
if(res.some(r=>r.retried))h+='<div class="retry-note">↻ = auto-retried after initial failure</div>';
el.innerHTML=h;
}

// ─── CSV EXPORTS ──────────────────────────────────────────────────────────────
function dl(fn,csv){const b=new Blob([csv],{type:'text/csv;charset=utf-8;'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=fn;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u)}
function cr(cells){return cells.map(c=>'"'+String(c||'').replace(/"/g,'""')+'"').join(',')+'\n'}
const today=new Date().toISOString().split('T')[0];

function exportBulkCSV(){
if(!bulkData?.length){showErr('No bulk results');return}
let csv=cr(['Domain','Status','Valid','Title','HTTP Code','Word Count','Confidence','Redirect Target','Flags','Remarks']);
bulkData.forEach(r=>csv+=cr([r.domain,fmtS(r.overallStatus),r.isGenuinelyValid?'TRUE':'FALSE',r.title||'',r.statusCode||'',r.wordCount??'',r.confidence?r.confidence+'%':'',r.redirectInfo?.target||'',(r.flags||[]).join('; '),r.reasons?.[0]||r.error||'']));
dl('bulk-analysis-'+today+'.csv',csv);
}

function exportBizCSV(){
if(!bizData?.length){showErr('No business results');return}
let csv=cr(['Domain','Website Status','Country Code','Business Name','Street Address','City','State','Zip','Phone Number','Business Email','Business Type','Facebook','Instagram','Twitter/X','LinkedIn','YouTube','TikTok','Yelp','Google Business','All Social Links','Reasons','Meta Description']);
bizData.forEach(r=>{const a=r.address||{};const soc=r.socialSignals||[];
const getSoc=(name)=>{const s=soc.find(x=>x.platform===name);return s?s.url:''};
csv+=cr([r.domain,fmtS(r.websiteStatus||''),r.country?.code||'',r.businessName||'',a.street||'',a.city||'',a.state||'',a.zip||'',r.phones?.[0]||'',r.emails?.[0]||'',r.businessType||'',getSoc('Facebook'),getSoc('Instagram'),getSoc('Twitter/X'),getSoc('LinkedIn'),getSoc('YouTube'),getSoc('TikTok'),getSoc('Yelp'),getSoc('Google Business'),soc.map(s=>s.platform+': '+s.url).join(' | '),r.reasons?.[0]||r.error||'',r.metaDescription||''])});
dl('business-info-'+today+'.csv',csv);
}

function exportCombinedCSV(){
if(!bizData?.length&&!bulkData?.length){showErr('No data');return}
const map={};
if(bulkData)bulkData.forEach(r=>map[r.domain]={...map[r.domain],...r,_b:1});
if(bizData)bizData.forEach(r=>map[r.domain]={...map[r.domain],...r,_z:1});
const all=Object.values(map);
let csv=cr(['Domain','Website Status','Country Code','Business Name','Street Address','City','State','Zip','Phone Number','Business Email','Business Type','Facebook','Instagram','Twitter/X','LinkedIn','YouTube','TikTok','Yelp','Google Business','All Social Links','Reasons','Meta Description','Valid','HTTP Code','Word Count','Confidence','Redirect Target','Flags']);
all.forEach(r=>{const a=r.address||{};const soc=r.socialSignals||[];
const getSoc=(name)=>{const s=soc.find(x=>x.platform===name);return s?s.url:''};
csv+=cr([r.domain,fmtS(r.websiteStatus||r.overallStatus||''),r.country?.code||'',r.businessName||'',a.street||'',a.city||'',a.state||'',a.zip||'',r.phones?.[0]||'',r.emails?.[0]||'',r.businessType||'',getSoc('Facebook'),getSoc('Instagram'),getSoc('Twitter/X'),getSoc('LinkedIn'),getSoc('YouTube'),getSoc('TikTok'),getSoc('Yelp'),getSoc('Google Business'),soc.map(s=>s.platform+': '+s.url).join(' | '),r.reasons?.[0]||r.error||'',r.metaDescription||'',r._b?(r.isGenuinelyValid?'TRUE':'FALSE'):'',r.statusCode||'',r.wordCount??'',r.confidence?r.confidence+'%':'',r.redirectInfo?.target||'',(r.flags||[]).join('; ')])});
dl('combined-'+today+'.csv',csv);
}

switchTab('single');
